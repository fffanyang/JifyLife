version: '3.8'

services:
  jifylife:
    build: .
    container_name: jifylife
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      # 持久化数据库文件
      - jifylife-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:/app/data/jifylife.db
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-please-change-this-refresh-secret}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}

volumes:
  jifylife-data:
